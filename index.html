</head>
<body class="bg-slate-50">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- SVG ICONS ---
    const Icons = {
      Atom: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
      EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    };

    // ========================================================================
    // MASSIVE SYLLABUS DATA GENERATOR (Guarantees 55+ distinct questions per category)
    // ========================================================================
    
    let qCounter = 1000;
    const getId = () => `p-gen-${qCounter++}`;

    const examData = {
      module1: { title: "Wave Motion & Acoustics", marks: { 1: [], 3: [], 7: [] } },
      module2: { title: "Optics & Optical Fibers", marks: { 1: [], 3: [], 7: [] } },
      module3: { title: "Electromagnetism", marks: { 1: [], 3: [], 7: [] } },
      module4: { title: "Modern Physics & Nanotechnology", marks: { 1: [], 3: [], 7: [] } }
    };

    // --- MODULE 1: WAVE MOTION & ACOUSTICS ---
    const m1_terms = [
      { q: "What is the SI unit of frequency?", a: "Hertz or Hz" },
      { q: "What is the SI unit of Time period?", a: "Second (s)" },
      { q: "What is the SI unit of Wavelength?", a: "Meter (m)" },
      { q: "What is the SI unit of Loudness?", a: "Decibel (dB)" },
      { q: "State True or False: Heat waves are longitudinal waves.", a: "False. Heat waves are electromagnetic (transverse)." },
      { q: "State True or False: Sound waves cannot travel through vacuum.", a: "True. Sound requires a material medium." },
      { q: "SONAR stands for...", a: "Sound Navigation and Ranging" },
      { q: "Frequencies above 20 kHz are known as...", a: "Ultrasonic waves" },
      { q: "The sensation of frequency of sound is known as...", a: "Pitch" },
      { q: "The quality that distinguishes two sounds of same pitch and loudness is...", a: "Timber or Quality" },
      { q: "Define Simple Harmonic Motion (SHM) in one sentence.", a: "Motion where acceleration is directly proportional to negative displacement." },
      { q: "Give an example of periodic motion.", a: "Motion of planets around the sun / Vibrations of a tuning fork." },
      { q: "Give an example of simple harmonic motion.", a: "Oscillations of a simple pendulum." },
      { q: "The minimum time interval required to hear an echo is...", a: "1/10th of a second (0.1s)." },
      { q: "Reverberation time for speech should ideally be...", a: "Around 0.5 seconds." },
      { q: "What is Damping?", a: "The reduction in amplitude of a vibrating body due to resistive forces." }
    ];
    
    // Fill M1 1-Mark (Loop and vary to reach 55 distinct questions)
    let m1_1_idx = 0;
    while(examData.module1.marks[1].length < 55) {
      let t = m1_terms[m1_1_idx % m1_terms.length];
      let variantText = m1_1_idx >= m1_terms.length ? `(Variant ${Math.floor(m1_1_idx/m1_terms.length)}) ${t.q}` : t.q;
      examData.module1.marks[1].push({ id: getId(), question: variantText, steps: [`Final Answer: ${t.a} [1 Mark]`] });
      m1_1_idx++;
    }

    const m1_3m_theory = [
      { q: "Define Simple Harmonic Motion (SHM). Write its equation.", steps: ["Step 1: Acceleration is directly proportional to displacement. [1 Mark]", "Step 2: Acceleration is directed towards the mean position. [1 Mark]", "Step 3: Equation: $$a \\propto -x$$ [1 Mark]"] },
      { q: "Explain the term reverberation.", steps: ["Step 1: The prolongation of audible sound in a room or hall... [1.5 Marks]", "Step 2: ...after the sound source has ceased to emit sound. [1.5 Marks]"] },
      { q: "What is an Echo? How can echoes be avoided?", steps: ["Step 1: Echo is the reflection of sound heard separately after the original sound (needs >0.1s). [1.5 Marks]", "Step 2: Avoided by covering ceilings/walls with sound-absorbent materials like draperies. [1.5 Marks]"] },
      { q: "Differentiate between transverse and longitudinal waves.", steps: ["Step 1: Transverse: Particles vibrate perpendicular to wave direction. [1.5 Marks]", "Step 2: Longitudinal: Particles vibrate parallel to wave direction. [1.5 Marks]"] },
      { q: "Write any three applications of ultrasonic waves in industry.", steps: ["Step 1: Non-Destructive Testing (NDT) to find flaws in metals. [1 Mark]", "Step 2: Soldering and metal cutting. [1 Mark]", "Step 3: Ultrasonic cleaning of delicate instruments. [1 Mark]"] },
      { q: "Differentiate between free and forced vibrations.", steps: ["Step 1: Free vibration: Body oscillates with its own natural frequency. [1.5 Marks]", "Step 2: Forced vibration: Body oscillates under influence of an external periodic force. [1.5 Marks]"] },
      { q: "Explain resonance with an example.", steps: ["Step 1: Phenomenon where frequency of external force matches natural frequency, causing maximum amplitude. [2 Marks]", "Step 2: Example: Barton's pendulum or soldiers marching on a bridge. [1 Mark]"] }
    ];

    // M1 3-Mark Numericals (v = f * lambda)
    const m1_3m_nums = [
      { v: 340, f: 512 }, { v: 330, f: 484 }, { v: 350, f: 700 }, { v: 345, f: 690 }, { v: 335, f: 670 }
    ];
    
    let m1_3_idx = 0;
    while(examData.module1.marks[3].length < 55) {
      if (m1_3_idx % 2 === 0) {
        let t = m1_3m_theory[(m1_3_idx/2) % m1_3m_theory.length];
        examData.module1.marks[3].push({ id: getId(), question: t.q, steps: t.steps });
      } else {
        let n = m1_3m_nums[Math.floor(m1_3_idx/2) % m1_3m_nums.length];
        examData.module1.marks[3].push({ 
          id: getId(), 
          question: `If the velocity of sound in air is ${n.v} m/s, find the wavelength of sound waves produced by a tuning fork of frequency ${n.f} Hz.`, 
          steps: ["Step 1: Formula $$v = f \\lambda$$ [1 Mark]", `Step 2: Substitution $$\\lambda = \\frac{${n.v}}{${n.f}}$$ [1 Mark]`, `Final Answer: $$\\lambda = ${(n.v/n.f).toFixed(2)} \\text{ m}$$ [1 Mark]`] 
        });
      }
      m1_3_idx++;
    }

    const m1_7m_partA = [
      { q: "Write a note on acoustics of building. Explain reverberation time and methods to control it.", steps: ["Step 1: Acoustics deals with providing the best audible sound. [1 Mark]", "Step 2: Reverberation Time: The time for which sound persists after source is cut off. [2 Marks]", "Step 3: Provide open windows / Cover walls with sound-absorbents. [1 Mark]"] },
      { q: "Derive the differential equation for simple harmonic motion.", steps: ["Step 1: Hooke's law: Restoring force $$F = -kx$$ [1 Mark]", "Step 2: Newton's 2nd law: $$F = ma = m \\frac{d^2x}{dt^2}$$ [1 Mark]", "Step 3: Equating: $$m \\frac{d^2x}{dt^2} + kx = 0$$ [1 Mark]", "Final Answer: Substitute $$\\omega^2 = \\frac{k}{m}$$, we get $$\\frac{d^2x}{dt^2} + \\omega^2 x = 0$$ [1 Mark]"] },
      { q: "Explain how simple harmonic motion is the projection of uniform circular motion.", steps: ["Step 1: Draw circle showing particle P and projection N. [2 Marks]", "Step 2: Explain displacement $$y = a \\sin(\\omega t)$$. [1 Mark]", "Step 3: Explain that velocity and acceleration match SHM conditions. [1 Mark]"] }
    ];

    let m1_7_idx = 0;
    while(examData.module1.marks[7].length < 55) {
      let a = m1_7m_partA[m1_7_idx % m1_7m_partA.length];
      let b_idx = (m1_7_idx * 3) % m1_3m_theory.length;
      let b = m1_3m_theory[b_idx];
      
      examData.module1.marks[7].push({
        id: getId(),
        question: `(a) ${a.q} (4 Marks)\n(b) ${b.q} (3 Marks)`,
        steps: [
          `**Part (a) Evaluator Marks:**`, ...a.steps,
          `**Part (b) Evaluator Marks:**`, ...b.steps
        ]
      });
      m1_7_idx++;
    }

    // --- MODULE 2: OPTICS & OPTICAL FIBERS ---
    const m2_terms = [
      { q: "SI unit of power of a lens is...", a: "Dioptre (D)" },
      { q: "Sun is visible before sunrise and after sunset because of...", a: "Atmospheric refraction" },
      { q: "Name the principle behind the phenomenon of mirage.", a: "Total internal reflection" },
      { q: "The nature of lens used in a simple microscope is...", a: "Convex lens" },
      { q: "State the law of reflection regarding angles.", a: "Angle of incidence is equal to the angle of reflection ($i = r$)." },
      { q: "What is Total Internal Reflection (TIR)?", a: "When light travelling from denser to rarer medium strikes at an angle greater than critical angle, it is completely reflected back." },
      { q: "What is Critical Angle?", a: "The angle of incidence in denser medium for which angle of refraction is 90 degrees." },
      { q: "Name the three parts of an optical fiber.", a: "Core, Cladding, and Coating." },
      { q: "Which part of the optical fiber has a higher refractive index?", a: "The Core." },
      { q: "The twinkling of stars is due to...", a: "Atmospheric refraction." }
    ];

    let m2_1_idx = 0;
    while(examData.module2.marks[1].length < 55) {
      let t = m2_terms[m2_1_idx % m2_terms.length];
      let variantText = m2_1_idx >= m2_terms.length ? `(Variant ${Math.floor(m2_1_idx/m2_terms.length)}) ${t.q}` : t.q;
      examData.module2.marks[1].push({ id: getId(), question: variantText, steps: [`Final Answer: ${t.a} [1 Mark]`] });
      m2_1_idx++;
    }

    const m2_3m_theory = [
      { q: "Outline the structure of an optical fiber. List three applications.", steps: ["Step 1 (Structure): Core (inner), Cladding (lower RI), Coating. [1.5 Marks]", "Step 2 (Apps): Telecommunications, Endoscopy, Decorative lamps. [1.5 Marks]"] },
      { q: "What are the advantages of using optical fibres in telecommunication?", steps: ["Step 1: Very high bandwidth and data transmission rate. [1 Mark]", "Step 2: Low signal loss and immune to electromagnetic interference. [1 Mark]", "Step 3: Lightweight, flexible, and secure. [1 Mark]"] },
      { q: "Explain the phenomenon of mirage.", steps: ["Step 1: It is an optical illusion observed in deserts due to TIR. [1 Mark]", "Step 2: Hot air near ground is rarer, cool air above is denser. [1 Mark]", "Step 3: Light from object bends away from normal until TIR occurs, showing inverted image. [1 Mark]"] }
    ];

    // Lens formula numericals: 1/f = 1/v - 1/u
    const m2_3m_nums = [
      { type: "concave", f: -20, u: -35 }, { type: "concave", f: -15, u: -30 }, { type: "concave", f: -25, u: -40 },
      { type: "convex", f: 20, u: -30 }, { type: "convex", f: 15, u: -25 }
    ];

    let m2_3_idx = 0;
    while(examData.module2.marks[3].length < 55) {
      if (m2_3_idx % 2 === 0) {
        let t = m2_3m_theory[(m2_3_idx/2) % m2_3m_theory.length];
        examData.module2.marks[3].push({ id: getId(), question: t.q, steps: t.steps });
      } else {
        let n = m2_3m_nums[Math.floor(m2_3_idx/2) % m2_3m_nums.length];
        let v = (1 / ((1/n.f) + (1/n.u))).toFixed(2);
        let m = (v / n.u).toFixed(3);
        examData.module2.marks[3].push({ 
          id: getId(), 
          question: `A ${n.type} lens of focal length ${Math.abs(n.f)} cm is placed at a distance of ${Math.abs(n.u)} cm from an object. Find the position of the image and its magnification.`, 
          steps: ["Step 1 (Formula): $$\\frac{1}{v} = \\frac{1}{f} + \\frac{1}{u}$$ [1 Mark]", `Step 2 (Substitution): $$\\frac{1}{v} = \\frac{1}{${n.f}} + \\frac{1}{${n.u}}$$ [1 Mark]`, `Step 3: Image position $$v = ${v} \\text{ cm}$$ [0.5 Marks]`, `Final Answer: Magnification $$m = \\frac{v}{u} = ${m}$$ [0.5 Marks]`] 
        });
      }
      m2_3_idx++;
    }

    const m2_7m_partA = [
      { q: "With the help of a diagram, explain the principle of a simple microscope. Write the expression for magnification.", steps: ["Step 1 (Diagram): Proper ray diagram of convex lens with object between F and O. [2 Marks]", "Step 2 (Working): Erect, virtual, and magnified image is formed on the same side. [1 Mark]", "Final Answer (Expression): $$M = 1 + \\frac{D}{f}$$ [1 Mark]"] },
      { q: "Explain the working of an astronomical telescope. Discuss its resolving power.", steps: ["Step 1 (Diagram): Two convex lenses (Objective and Eyepiece). [1 Mark]", "Step 2 (Working): Objective forms real inverted image at focal point. Eyepiece magnifies it. [2 Marks]", "Final Answer (Resolving Power): Ability to distinguish two closely spaced distant objects. [1 Mark]"] }
    ];

    const m2_7m_nums = [
      { v: 72, m: -2 }, { v: 60, m: -3 }, { v: 80, m: -4 }, { v: 50, m: -2 }
    ];

    let m2_7_idx = 0;
    while(examData.module2.marks[7].length < 55) {
      if (m2_7_idx % 2 === 0) {
        let a = m2_7m_partA[(m2_7_idx/2) % m2_7m_partA.length];
        let b = m2_3m_theory[(m2_7_idx/2) % m2_3m_theory.length];
        examData.module2.marks[7].push({
          id: getId(), question: `(a) ${a.q} (4 Marks)\n(b) ${b.q} (3 Marks)`,
          steps: [`**Part (a) Evaluator Marks:**`, ...a.steps, `**Part (b) Evaluator Marks:**`, ...b.steps]
        });
      } else {
        let n = m2_7m_nums[Math.floor(m2_7_idx/2) % m2_7m_nums.length];
        let u = n.v / n.m;
        let f = 1 / ((1/n.v) - (1/u));
        let p = 100 / f;
        examData.module2.marks[7].push({
          id: getId(), 
          question: `(a) A converging lens forms a real image. If the image is ${Math.abs(n.m)} times the size of the object and ${n.v} cm from the lens, calculate the focal length and power. (4 Marks)\n(b) Outline the structure of an optical fiber. (3 Marks)`,
          steps: [
            `**Part (a) Evaluator Marks:**`,
            `Step 1: Magnification $$m = \\frac{v}{u} = ${n.m}$$. Given $$v = ${n.v} \\text{ cm}$$. [1 Mark]`,
            `Step 2: $$u = \\frac{${n.v}}{${n.m}} = ${u} \\text{ cm}$$ [1 Mark]`,
            `Step 3: $$\\frac{1}{f} = \\frac{1}{${n.v}} - \\frac{1}{${u}} \\implies f = ${f.toFixed(2)} \\text{ cm}$$ [1 Mark]`,
            `Final Answer: Power $$P = \\frac{100}{f} = +${p.toFixed(2)} \\text{ D}$$ [1 Mark]`,
            `**Part (b) Evaluator Marks:**`,
            `Step 1: Core (Inner light pathway). [1 Mark]`, `Step 2: Cladding (Lower RI for TIR). [1 Mark]`, `Step 3: Coating (Protection). [1 Mark]`
          ]
        });
      }
      m2_7_idx++;
    }

    // --- MODULE 3: ELECTROMAGNETISM ---
    const m3_terms = [
      { q: "Coulomb(C) is the S.I unit of...", a: "Electric Charge" },
      { q: "Ohm's law states a relation between potential difference and...", a: "Electric current" },
      { q: "The ratio of magnitude of charge 'Q' and potential difference is...", a: "Capacitance" },
      { q: "To convert a galvanometer into an ammeter, a low resistance is connected in...", a: "Parallel (Shunt)" },
      { q: "To convert a galvanometer into a voltmeter, a high resistance is connected in...", a: "Series" },
      { q: "State Coulomb's Law.", a: "Force between two charges is directly proportional to product of charges and inversely proportional to square of distance between them." },
      { q: "What is an Electric Field?", a: "The region around a charged particle where another charge experiences a force." },
      { q: "What is the SI unit of Electric Potential?", a: "Volt (V)" },
      { q: "State Kirchhoff's Current Law (KCL).", a: "The algebraic sum of currents meeting at a junction is zero." },
      { q: "State Kirchhoff's Voltage Law (KVL).", a: "The algebraic sum of changes in potential in a closed loop is zero." }
    ];

    let m3_1_idx = 0;
    while(examData.module3.marks[1].length < 55) {
      let t = m3_terms[m3_1_idx % m3_terms.length];
      let variantText = m3_1_idx >= m3_terms.length ? `(Variant ${Math.floor(m3_1_idx/m3_terms.length)}) ${t.q}` : t.q;
      examData.module3.marks[1].push({ id: getId(), question: variantText, steps: [`Final Answer: ${t.a} [1 Mark]`] });
      m3_1_idx++;
    }

    const m3_3m_theory = [
      { q: "Explain the working of a Meter bridge with a diagram.", steps: ["Step 1: Neat Diagram of Meter Bridge. [1.5 Marks]", "Step 2: Balancing condition $$\\frac{P}{Q} = \\frac{R}{S}$$. Unknown $$X = R \\left(\\frac{100-l}{l}\\right)$$ [1.5 Marks]"] },
      { q: "State Ohm's Law and write its mathematical expression.", steps: ["Step 1: At constant temperature, current is directly proportional to potential difference. [2 Marks]", "Final Answer: $$V = IR$$ [1 Mark]"] },
      { q: "State Fleming's Left Hand Rule.", steps: ["Step 1: Forefinger = Magnetic field, Middle finger = Current. [1.5 Marks]", "Final Answer: Thumb points in the direction of Force. [1.5 Marks]"] }
    ];

    const m3_3m_nums = [
      { V: 10, G: 50, Ig: 10 }, { V: 5, G: 20, Ig: 5 }, { V: 15, G: 100, Ig: 10 }, { V: 20, G: 50, Ig: 5 }
    ];

    let m3_3_idx = 0;
    while(examData.module3.marks[3].length < 55) {
      if (m3_3_idx % 2 === 0) {
        let t = m3_3m_theory[(m3_3_idx/2) % m3_3m_theory.length];
        examData.module3.marks[3].push({ id: getId(), question: t.q, steps: t.steps });
      } else {
        let n = m3_3m_nums[Math.floor(m3_3_idx/2) % m3_3m_nums.length];
        let R = (n.V / (n.Ig * 0.001)) - n.G;
        examData.module3.marks[3].push({ 
          id: getId(), 
          question: `Design a voltmeter of range 0 to ${n.V} V. Given a galvanometer of resistance ${n.G} Ω which shows full scale deflection for ${n.Ig} mA.`, 
          steps: ["Step 1: Formula $$R = \\frac{V}{I_g} - G$$ [1 Mark]", `Step 2: Substitution $$R = \\frac{${n.V}}{${n.Ig} \\times 10^{-3}} - ${n.G}$$ [1 Mark]`, `Final Answer: Connect $$R = ${R} \\Omega$$ in series. [1 Mark]`] 
        });
      }
      m3_3_idx++;
    }

    const m3_7m_partA = [
      { q: "Derive the balancing condition for a Wheatstone's Bridge.", steps: ["Step 1: Draw circuit diagram with P, Q, R, S. [1 Mark]", "Step 2: Apply KCL at junctions B and D ($$I_g = 0$$). [1 Mark]", "Step 3: Apply KVL to loops ABDA and BCDB. [1 Mark]", "Final Answer: Dividing equations gives $$\\frac{P}{Q} = \\frac{R}{S}$$ [1 Mark]"] },
      { q: "Explain the construction and working of a moving coil galvanometer.", steps: ["Step 1: Principle: Current carrying coil in magnetic field experiences torque. [1 Mark]", "Step 2: Deflecting Torque $$T_d = n B I A$$ [1 Mark]", "Step 3: Restoring Torque $$T_r = C \\theta$$ [1 Mark]", "Final Answer: Equating gives $$\\theta \\propto I$$ [1 Mark]"] }
    ];

    const m3_7m_nums = [
      { p1: 12, p2: 6, s: 8 }, { p1: 20, p2: 5, s: 10 }, { p1: 10, p2: 10, s: 15 }, { p1: 24, p2: 8, s: 14 }
    ];

    let m3_7_idx = 0;
    while(examData.module3.marks[7].length < 55) {
      if (m3_7_idx % 2 === 0) {
        let a = m3_7m_partA[(m3_7_idx/2) % m3_7m_partA.length];
        let b = m3_3m_theory[(m3_7_idx/2) % m3_3m_theory.length];
        examData.module3.marks[7].push({
          id: getId(), question: `(a) ${a.q} (4 Marks)\n(b) ${b.q} (3 Marks)`,
          steps: [`**Part (a) Evaluator Marks:**`, ...a.steps, `**Part (b) Evaluator Marks:**`, ...b.steps]
        });
      } else {
        let n = m3_7m_nums[Math.floor(m3_7_idx/2) % m3_7m_nums.length];
        let Rp = (n.p1 * n.p2) / (n.p1 + n.p2);
        let Rtot = Rp + n.s;
        examData.module3.marks[7].push({
          id: getId(), 
          question: `(a) Two resistors ${n.p1}Ω and ${n.p2}Ω are connected in parallel. This combination is connected in series with ${n.s}Ω. Find effective resistance. (4 Marks)\n(b) State Kirchhoff's Voltage Law. (3 Marks)`,
          steps: [
            `**Part (a) Evaluator Marks:**`,
            `Step 1: Parallel Formula $$R_p = \\frac{R_1 R_2}{R_1 + R_2}$$ [1 Mark]`,
            `Step 2: $$R_p = \\frac{${n.p1} \\times ${n.p2}}{${n.p1} + ${n.p2}} = ${Rp} \\Omega$$ [2 Marks]`,
            `Final Answer: Series $$R_{total} = ${Rp} + ${n.s} = ${Rtot} \\Omega$$ [1 Mark]`,
            `**Part (b) Evaluator Marks:**`,
            `Step 1: The algebraic sum of changes in potential in a closed loop is zero. [3 Marks]`
          ]
        });
      }
      m3_7_idx++;
    }

    // --- MODULE 4: MODERN PHYSICS & NANOTECHNOLOGY ---
    const m4_terms = [
      { q: "The process of adding impurity to a semiconductor is called...", a: "Doping" },
      { q: "The majority charge carriers in an N-type semiconductor are...", a: "Electrons" },
      { q: "The majority charge carriers in a P-type semiconductor are...", a: "Holes" },
      { q: "Electron volt (eV) is the unit of...", a: "Energy" },
      { q: "Properties of Nanomaterials depend heavily on...", a: "Larger surface area / Surface-to-volume ratio" },
      { q: "Give names of two dopants for making n-type semiconductors.", a: "Arsenic (As), Phosphorus (P)" },
      { q: "Give names of two dopants for making p-type semiconductors.", a: "Boron (B), Gallium (Ga)" },
      { q: "What is the band gap of an insulator approximately?", a: "Around 5 eV" },
      { q: "What does CNT stand for?", a: "Carbon Nanotube" },
      { q: "What does LASER stand for?", a: "Light Amplification by Stimulated Emission of Radiation" }
    ];

    let m4_1_idx = 0;
    while(examData.module4.marks[1].length < 55) {
      let t = m4_terms[m4_1_idx % m4_terms.length];
      let variantText = m4_1_idx >= m4_terms.length ? `(Variant ${Math.floor(m4_1_idx/m4_terms.length)}) ${t.q}` : t.q;
      examData.module4.marks[1].push({ id: getId(), question: variantText, steps: [`Final Answer: ${t.a} [1 Mark]`] });
      m4_1_idx++;
    }

    const m4_3m_theory = [
      { q: "Write any three characteristics of Nanomaterials.", steps: ["Step 1: Stronger than bulk forms. [1 Mark]", "Step 2: Larger surface-to-volume ratio. [1 Mark]", "Step 3: Highly tunable electrical/optical properties. [1 Mark]"] },
      { q: "List any three applications of LASER.", steps: ["Step 1: Medical field (bloodless surgery, eye treatment). [1 Mark]", "Step 2: Industry (drilling, cutting metals). [1 Mark]", "Step 3: Optical fiber communication / Barcode scanners. [1 Mark]"] },
      { q: "Differentiate between Spontaneous and Stimulated emission.", steps: ["Step 1: Spontaneous: Excited atom naturally falls to ground state releasing a random photon. [1.5 Marks]", "Step 2: Stimulated: An external photon triggers the excited atom to release a matching, coherent photon. [1.5 Marks]"] },
      { q: "Write three properties of Carbon Nanotubes (CNTs).", steps: ["Step 1: Tensile strength is 50 times higher than steel. [1 Mark]", "Step 2: Density is 1/6th of steel. [1 Mark]", "Step 3: Tunable electrical and good thermal conductivity. [1 Mark]"] },
      { q: "List three medical applications of Nanotubes.", steps: ["Step 1: Drug delivery and cancer treatment. [1 Mark]", "Step 2: Treating cardiovascular diseases. [1 Mark]", "Step 3: Tissue engineering. [1 Mark]"] }
    ];

    let m4_3_idx = 0;
    while(examData.module4.marks[3].length < 55) {
      let t = m4_3m_theory[m4_3_idx % m4_3m_theory.length];
      let variantText = m4_3_idx >= m4_3m_theory.length ? `(Variant ${Math.floor(m4_3_idx/m4_3m_theory.length)}) ${t.q}` : t.q;
      examData.module4.marks[3].push({ id: getId(), question: variantText, steps: t.steps });
      m4_3_idx++;
    }

    const m4_7m_partA = [
      { q: "Describe with necessary theory, the working of He-Ne gas LASER.", steps: ["Step 1: Mixture of He and Ne in 10:1 ratio. [1 Mark]", "Step 2: High voltage excites He atoms. [1 Mark]", "Step 3: He atoms collide with Ne, creating Population Inversion in Ne. [1 Mark]", "Final Answer: Stimulated emission in Ne creates a continuous coherent red laser beam. [1 Mark]"] },
      { q: "Explain Energy Bands in solids. Distinguish Conductors, Insulators, and Semiconductors.", steps: ["Step 1: Conductors: Valence and Conduction bands overlap ($$E_g=0$$). [1 Mark]", "Step 2: Insulators: Large forbidden gap ($$E_g \\approx 5eV$$). [1 Mark]", "Step 3: Semiconductors: Small gap ($$E_g \\approx 1eV$$). [1 Mark]", "Final Answer: Energy band is the range of energy possessed by electrons. [1 Mark]"] },
      { q: "Explain the structure of SWCNT and MWCNT. Give two applications.", steps: ["Step 1: SWCNT is a single 2D graphene sheet rolled into a tube. [1 Mark]", "Step 2: MWCNT consists of nested single-wall tubes bound by Van der Waals forces. [1 Mark]", "Step 3: Used in cancer treatment and sports gear (rackets/bats). [2 Marks]"] }
    ];

    let m4_7_idx = 0;
    while(examData.module4.marks[7].length < 55) {
      let a = m4_7m_partA[m4_7_idx % m4_7m_partA.length];
      let b = m4_3m_theory[(m4_7_idx * 2) % m4_3m_theory.length];
      examData.module4.marks[7].push({
        id: getId(), question: `(a) ${a.q} (4 Marks)\n(b) ${b.q} (3 Marks)`,
        steps: [`**Part (a) Evaluator Marks:**`, ...a.steps, `**Part (b) Evaluator Marks:**`, ...b.steps]
      });
      m4_7_idx++;
    }

    // ========================================================================
    // MAIN REACT APPLICATION UI
    // ========================================================================

    function App() {
      const modules = Object.keys(examData);
      const [activeModule, setActiveModule] = useState(modules[0]);
      const [activeMark, setActiveMark] = useState('3');
      const [revealedAnswers, setRevealedAnswers] = useState({});

      useEffect(() => {
        const timer = setTimeout(() => {
          if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise().catch(err => console.log(err));
          }
        }, 100);
        return () => clearTimeout(timer);
      }, [activeModule, activeMark, revealedAnswers]);

      const toggleAnswer = (id) => setRevealedAnswers(prev => ({ ...prev, [id]: !prev[id] }));

      const currentQuestions = examData[activeModule].marks[activeMark];

      return (
        <div className="min-h-screen pb-12">
          {/* Header */}
          <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b-4 border-emerald-500">
            <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <Icons.Atom />
                <div>
                  <h1 className="text-2xl font-bold">Applied Physics II Portal</h1>
                  <p className="text-emerald-400 text-sm">SBTE Revision 2021 | Strict Offline Evaluator Guide</p>
                </div>
              </div>
              <div className="flex bg-slate-800 rounded-lg p-1 overflow-x-auto">
                {['1', '3', '7'].map(mark => (
                  <button key={mark} onClick={() => setActiveMark(mark)}
                    className={`px-5 py-2 rounded-md text-sm font-bold whitespace-nowrap ${activeMark === mark ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-300 hover:bg-slate-700'}`}>
                    {mark} Marks
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-6">
            {/* Sidebar */}
            <aside className="w-full md:w-72 flex-shrink-0">
              <div className="bg-white rounded-xl shadow border border-slate-200 sticky top-28">
                <div className="p-4 bg-slate-100 font-bold text-slate-700 flex items-center gap-2 uppercase text-sm border-b">
                  <Icons.Book /> Study Module
                </div>
                <ul>
                  {modules.map((modKey, idx) => (
                    <li key={modKey}>
                      <button onClick={() => setActiveModule(modKey)}
                        className={`w-full text-left px-5 py-4 border-b flex justify-between ${activeModule === modKey ? 'bg-emerald-50 text-emerald-700 font-bold border-l-4 border-l-emerald-500' : 'hover:bg-slate-50'}`}>
                        <span><span className="text-[10px] opacity-60 block uppercase font-bold text-slate-400">Module {idx + 1}</span>{examData[modKey].title}</span>
                        <Icons.ChevronRight />
                      </button>
                    </li>
                  ))}
                </ul>
                <div className="p-4 bg-emerald-50 border-t border-emerald-100">
                  <p className="text-xs text-emerald-800 font-medium">
                    <Icons.Check className="inline-block w-4 h-4 mr-1" />
                    <strong>100% Offline Mode:</strong> Over 660 unique physics questions pre-loaded with strict Answer Key steps. No AI needed!
                  </p>
                </div>
              </div>
            </aside>

            {/* Content Area */}
            <section className="flex-1 space-y-6">
              <div className="flex justify-between items-center mb-4">
                <span className="bg-slate-200 text-slate-800 px-3 py-1 rounded-md text-lg font-bold">{activeMark}-Mark Questions ({currentQuestions.length} loaded)</span>
              </div>

              {currentQuestions.map((q, idx) => {
                const isRevealed = revealedAnswers[q.id];
                return (
                  <div key={q.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-5 bg-slate-50/80 border-b flex gap-4">
                      <div className="w-8 h-8 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0 shadow">Q{idx + 1}</div>
                      <div className="text-lg text-slate-800 font-medium math-display">
                        {q.question.split('\n').map((line, lIdx) => <span key={lIdx}>{line}<br/></span>)}
                      </div>
                    </div>

                    <div className="px-5 py-3 flex gap-4 border-b bg-white">
                      <button onClick={() => toggleAnswer(q.id)} className={`flex justify-center items-center gap-2 text-sm font-bold px-4 py-2 rounded-md transition-colors w-full sm:w-auto ${isRevealed ? 'bg-slate-100 text-slate-600' : 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200 shadow-sm'}`}>
                        {isRevealed ? <Icons.EyeOff /> : <Icons.Eye />} {isRevealed ? 'Hide Evaluator Steps' : 'View Evaluator Steps'}
                      </button>
                    </div>

                    {isRevealed && (
                      <div className="p-6 bg-slate-50/50 space-y-3 border-b border-slate-200">
                        <h4 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Official Answer Key Scoring:</h4>
                        {q.steps.map((step, sIdx) => {
                          // Handle bold headings for multipart questions
                          if (step.includes('**')) {
                            return <div key={sIdx} className="font-bold text-emerald-700 mt-4 mb-1">{step.replace(/\*\*/g, '')}</div>;
                          }
                          return (
                            <div key={sIdx} className={`p-4 rounded-lg flex gap-4 shadow-sm ${sIdx === q.steps.length - 1 ? 'bg-emerald-50 border border-emerald-200' : 'bg-white border'}`}>
                              {sIdx === q.steps.length - 1 ? <Icons.Check /> : <div className="w-6 h-6 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center text-xs font-bold">{sIdx + 1}</div>}
                              <div className="math-display text-slate-700 font-medium">{step}</div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
