<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applied Physics II - Exam Portal</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Configure MathJax for Physics Formulas -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      startup: { typeset: false }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

  <style>
    .math-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 4px; }
    .math-display::-webkit-scrollbar { height: 6px; }
    .math-display::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    .math-display::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .math-display::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    mjx-container[jax="CHTML"][display="true"] { margin: 0 !important; text-align: left !important; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 2s linear infinite; }
  </style>
</head>
<body class="bg-slate-50">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- GEMINI API INTEGRATION ---
    const callGeminiAPI = async (prompt) => {
      const apiKey = ""; // The execution environment provides the key at runtime
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = { contents: [{ parts: [{ text: prompt }] }] };

      const fetchWithRetry = async (retries = 5, delay = 1000) => {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
        } catch (error) {
          if (retries > 0) {
            await new Promise(resolve => setTimeout(resolve, delay));
            return fetchWithRetry(retries - 1, delay * 2);
          }
          throw new Error("Failed to connect to AI after multiple attempts.");
        }
      };
      return fetchWithRetry();
    };

    // --- SVG ICONS ---
    const Icons = {
      Atom: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      Book: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>,
      EyeOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>,
      Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
      ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>,
      Sparkles: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
    };

    // --- PHYSICS DATA BANK (Directly from Uploaded Official Answer Keys) ---
    // The "steps" here exactly match the points and split marks assigned by SBTE evaluators.
    const examData = {
      module1: {
        title: "Wave Motion & Acoustics",
        marks: {
          1: [
            { id: "p1-1-1", question: "SI unit of frequency is ..........", steps: ["Final Answer: Hertz or Hz [1 Mark]"] },
            { id: "p1-1-2", question: "State whether the following statement is true or false. The heat waves are longitudinal waves.", steps: ["Final Answer: false [1 Mark]"] },
            { id: "p1-1-3", question: "SONAR stands for ..........", steps: ["Final Answer: Sound Navigation and Ranging [1 Mark]"] },
            { id: "p1-1-4", question: "As the wavelength of a sound wave decreases, its frequency will ..........", steps: ["Final Answer: increase [1 Mark]"] }
          ],
          3: [
            { id: "p1-3-1", question: "If the velocity of sound in air is 340 m/s, find the wavelength of the sound waves produced by the tuning fork of frequency 512 Hz.", steps: ["Step 1 (Formula): $$v = f \\lambda$$ [1 Mark]", "Step 2 (Substitution): $$\\lambda = \\frac{v}{f} = \\frac{340}{512}$$ [1 Mark]", "Final Answer: $$\\lambda = 0.66 \\text{ m}$$ [1 Mark]"] },
            { id: "p1-3-2", question: "Define Simple Harmonic Motion (SHM).", steps: ["Step 1: The acceleration of the body is directly proportional to its displacement. [1 Mark]", "Step 2: The acceleration is always directed towards the fixed mean position. [1 Mark]", "Step 3: Equation: $$a \\propto -x$$ [1 Mark]"] },
            { id: "p1-3-3", question: "Explain the term reverberation.", steps: ["Step 1: The prolongation of audible sound in a room or hall... [1.5 Marks]", "Step 2: ...after the sound has ceased to emit sound. [1.5 Marks]"] }
          ],
          7: [
            { id: "p1-7-1", question: "Write a note on acoustics of building. Explain reverberation time and methods to control it.", steps: ["Step 1 (Definition): Acoustics deals with providing the best audible sound to the audience. [1 Mark]", "Step 2 (Reverberation Time): The time for which the sound persists in a room or hall after the original sound is cut off. [2 Marks]", "Step 3 (Method 1): Provide a few open windows. / Cover the walls with sound-absorbent materials like cardboards, curtains, carpet. [2 Marks]", "Step 4 (Method 2): Use Cushioned seats. / Avoid large concave, spherical or cylindrical surfaces. [2 Marks]"] },
            { id: "p1-7-2", question: "Derive the differential equation for simple harmonic motion.", steps: ["Step 1: Hooke's law: Restoring force $$F = -kx$$ [2 Marks]", "Step 2: Newton's second law: $$F = ma = m \\frac{d^2x}{dt^2}$$ [2 Marks]", "Step 3: Equating: $$m \\frac{d^2x}{dt^2} = -kx$$ [1 Mark]", "Step 4: $$\\frac{d^2x}{dt^2} + \\frac{k}{m}x = 0$$ [1 Mark]", "Final Answer: Substitute $$\\omega^2 = \\frac{k}{m}$$, we get $$\\frac{d^2x}{dt^2} + \\omega^2 x = 0$$ [1 Mark]"] }
          ]
        }
      },
      module2: {
        title: "Optics & Optical Fibers",
        marks: {
          1: [
            { id: "p2-1-1", question: "Sun is visible before sunrise and after sunset because of............", steps: ["Final Answer: Atmospheric refraction or refraction of light [1 Mark]"] },
            { id: "p2-1-2", question: "Name the principle behind the phenomenon of mirage?", steps: ["Final Answer: total internal reflection [1 Mark]"] },
            { id: "p2-1-3", question: "SI unit of power of a lens is ..........", steps: ["Final Answer: dioptre [1 Mark]"] }
          ],
          3: [
            { id: "p2-3-1", question: "A concave lens of focal length 20cm is placed at a distance of 35cm from an object. Find the position of the image and its magnification.", steps: ["Step 1 (Formula): $$\\frac{1}{v} - \\frac{1}{u} = \\frac{1}{f}$$  => $$\\frac{1}{v} = \\frac{1}{f} + \\frac{1}{u}$$ [1 Mark]", "Step 2 (Substitution): $$=\\frac{1}{-20} + \\frac{1}{-35}$$ [1 Mark]", "Step 3 (Calculation): $$=\\frac{-35-20}{(-20) \\times (-35)}$$ [1 Mark]", "Step 4: Image position $$v = -12.73 \\text{ cm}$$ [2 Marks]", "Final Answer: Magnification $$m = \\frac{v}{u} = \\frac{-12.73}{-35} = 0.364$$ [2 Marks]"] },
            { id: "p2-3-2", question: "Outline the structure of an optical fiber. List any three applications.", steps: ["Step 1 (Structure): Core (inner), Cladding (outer with lower RI), Coating (protective). [3 Marks]", "Step 2 (App 1): Used to transmit communication signals. [1.5 Marks]", "Step 3 (App 2): Used in medical field (Endoscopy). [1.5 Marks]", "Step 4 (App 3): Used for decoration purposes. [1 Mark]"] }
          ],
          7: [
            { id: "p2-7-1", question: "With the help of a diagram, explain the principle of a simple microscope. Write the expression for magnification.", steps: ["Step 1 (Diagram): Proper ray diagram of convex lens with object between F and O. [2 Marks]", "Step 2 (Construction): A single convex lens of short focal length. [1 Mark]", "Step 3 (Working): When an object is placed between the principal focus and optical centre, an erect, virtual, and magnified image is formed. [2 Marks]", "Final Answer (Expression): $$M = 1 + \\frac{D}{f}$$ [2 Marks]"] },
            { id: "p2-7-2", question: "A converging lens forms a real image. If the image is twice the size of the object and 72 cm from the lens, calculate the focal length and power.", steps: ["Step 1: Magnification $$m = \\frac{v}{u} = -2$$ (since real image). Given $$v = 72 \\text{ cm}$$. [1 Mark]", "Step 2: $$u = \\frac{v}{-2} = \\frac{72}{-2} = -36 \\text{ cm}$$ [2 Marks]", "Step 3: $$\\frac{1}{f} = \\frac{1}{v} - \\frac{1}{u} = \\frac{1}{72} - \\frac{1}{-36}$$ [2 Marks]", "Step 4: $$f = \\frac{72}{3} = 24 \\text{ cm} = 0.24 \\text{ m}$$ [1 Mark]", "Final Answer: Power $$P = \\frac{1}{f(\\text{in m})} = \\frac{1}{0.24} = +4.16 \\text{ D}$$ [1 Mark]"] }
          ]
        }
      },
      module3: {
        title: "Electromagnetism",
        marks: {
          1: [
            { id: "p3-1-1", question: "..is the ratio of magnitude of charge 'Q' on either plates and potential difference across the plate.", steps: ["Final Answer: capacitance [1 Mark]"] },
            { id: "p3-1-2", question: "Ohm's law states a relation between the potential difference and the ..........", steps: ["Final Answer: Electric current [1 Mark]"] },
            { id: "p3-1-3", question: "Coulomb(C) is the S I unit of ..........", steps: ["Final Answer: Charge [1 Mark]"] }
          ],
          3: [
            { id: "p3-3-1", question: "Design a voltmeter of range 0 to 10 V. Given a galvanometer of resistance 50Ω which shows full scale deflection for 10mA.", steps: ["Step 1: Write given data, $$G=50\\Omega$$, $$i_g=10\\text{mA} = 10 \\times 10^{-3}\\text{A}$$ [1 Mark]", "Step 2: Formula $$R = \\frac{V}{i_g} - G$$ [1 Mark]", "Step 3: Substitution $$R = \\frac{10}{10 \\times 10^{-3}} - 50$$ [2 Marks]", "Final Answer: $$R = 1000 - 50 = 950\\Omega$$. Connect $$950\\Omega$$ in series with the galvanometer. [3 Marks]"] },
            { id: "p3-3-2", question: "Explain the working of a Meter bridge with a diagram.", steps: ["Step 1: Neat Diagram of Meter Bridge with connections. [2 Marks]", "Step 2: It is a practical application of Wheatstone's bridge. [1 Mark]", "Step 3: Balancing condition $$\\frac{P}{Q} = \\frac{R}{S}$$ [2 Marks]", "Final Answer: Unknown resistance $$X = R \\left(\\frac{100-l}{l}\\right)$$ [2 Marks]"] }
          ],
          7: [
            { id: "p3-7-1", question: "Two resistors 12Ω and 6Ω are connected in parallel and the combination is then connected in series with 8Ω. Find the effective resistance.", steps: ["Step 1 (Parallel Formula): $$R_p = \\frac{R_1R_2}{R_1+R_2}$$ [1 Mark]", "Step 2 (Substitution): $$R_p = \\frac{12 \\times 6}{12 + 6}$$ [2 Marks]", "Step 3 (Result for parallel): $$R_p = \\frac{72}{18} = 4\\Omega$$ [2 Marks]", "Step 4 (Series connection): This $$4\\Omega$$ is in series with the $$8\\Omega$$ resistance. [1 Mark]", "Final Answer: Total Effective Resistance = $$4 + 8 = 12\\Omega$$ [1 Mark]"] },
            { id: "p3-7-2", question: "Derive the balancing condition for a Wheatstone's Bridge.", steps: ["Step 1: Draw circuit diagram with P, Q, R, S and Galvanometer. [2 Marks]", "Step 2: Apply Kirchhoff's current law at junctions B and D: $$I_g = 0$$ so $$I_1=I_2$$ and $$I_3=I_4$$. [2 Marks]", "Step 3: Apply Kirchhoff's voltage law to loop ABDA: $$I_1 P = I_3 R$$ [1 Mark]", "Step 4: Apply Kirchhoff's voltage law to loop BCDB: $$I_2 Q = I_4 S$$ [1 Mark]", "Final Answer: Dividing the equations gives the balancing condition $$\\frac{P}{Q} = \\frac{R}{S}$$ [1 Mark]"] }
          ]
        }
      },
      module4: {
        title: "Modern Physics & Nanotechnology",
        marks: {
          1: [
            { id: "p4-1-1", question: "Give the names of two dopants for making n-type semiconductors.", steps: ["Final Answer: Any two: arsenic (As), bismuth (Bi), antimony (Sb), phosphorus (P) [1 Mark]"] },
            { id: "p4-1-2", question: "Properties of Nanomaterials depend heavily on ..........", steps: ["Final Answer: Larger surface area [1 Mark]"] },
            { id: "p4-1-3", question: "The majority charge carriers in p- type semiconductor is---------", steps: ["Final Answer: Holes [1 Mark]"] }
          ],
          3: [
            { id: "p4-3-1", question: "Write any three characteristics of Nanomaterials.", steps: ["Step 1: Nanomaterials are stronger than their bulk forms. [1 Mark]", "Step 2: Larger percentage of atoms lie on the surface (high surface-to-volume ratio). [1 Mark]", "Step 3: Show size-dependent electrical/optical properties. [1 Mark]"] },
            { id: "p4-3-2", question: "List any three applications of LASER.", steps: ["Step 1: In medical field for bloodless surgery and eye treatments. [1 Mark]", "Step 2: In industry for drilling, cutting, and welding metals. [1 Mark]", "Step 3: In optical fiber communication and barcode scanners. [1 Mark]"] }
          ],
          7: [
            { id: "p4-7-1", question: "Describe with necessary theory, the working of He-Ne gas LASER.", steps: ["Step 1 (Components): He and Ne gases in 10:1 ratio. Ne is the active medium. [2 Marks]", "Step 2 (Excitation): High voltage discharge excites Helium atoms. [2 Marks]", "Step 3 (Population Inversion): Excited He atoms collide with Ne atoms, transferring energy to Ne. [1 Mark]", "Step 4 (Emission): Stimulated emission occurs in Ne atoms, emitting photons. [1 Mark]", "Final Answer: The optical resonator (mirrors) amplifies this into a coherent laser beam. [1 Mark]"] },
            { id: "p4-7-2", question: "Distinguish between Conductors, Insulators, and Semiconductors based on band theory.", steps: ["Step 1: Definition of Energy bands (Valence and Conduction bands). [1 Mark]", "Step 2 (Conductors): Valence and Conduction bands overlap ($E_g = 0$). Electrons flow freely. [2 Marks]", "Step 3 (Insulators): Large forbidden gap ($E_g \\approx 5eV$). Valence band full, Conduction band empty. [2 Marks]", "Final Answer (Semiconductors): Small forbidden gap ($E_g \\approx 1eV$). Conductivity between conductors and insulators. [2 Marks]"] }
          ]
        }
      }
    };

    // --- PROCEDURAL PHYSICS EXPANSION ENGINE ---
    // Generates 100+ numerical variations for physics calculations
    const generatePhysicsVariant = (text) => {
      const regex = /\b(10|12|15|20|24|30|35|40|50|60|72|340|512)\b/g;
      return text.replace(regex, (match) => {
        let num = parseInt(match);
        let shift = [2, 4, 5, 10][Math.floor(Math.random() * 4)];
        let sign = Math.random() > 0.5 ? 1 : -1;
        return (num + (shift * sign)).toString();
      });
    };

    Object.keys(examData).forEach(mod => {
      Object.keys(examData[mod].marks).forEach(mark => {
        const baseQs = examData[mod].marks[mark];
        let currentLen = baseQs.length;
        
        while(currentLen < 105) {
          const template = baseQs[currentLen % baseQs.length];
          baseQs.push({
            id: `${template.id}-ext-${currentLen}`,
            question: generatePhysicsVariant(template.question),
            steps: [
              "🤖 **AI Tutor Physics Expansion**",
              "This is a procedurally generated variant of the official board exam physics problems.",
              "👉 **Click the '✨ AI Solve Steps' button below** to have your Gemini AI Tutor calculate the exact step-by-step physics solution, formula, and units for these specific numbers based on the evaluator marking scheme!"
            ]
          });
          currentLen++;
        }
      });
    });

    function App() {
      const modules = Object.keys(examData);
      const [activeModule, setActiveModule] = useState(modules[0]);
      const [activeMark, setActiveMark] = useState('3');
      const [revealedAnswers, setRevealedAnswers] = useState({});
      const [aiData, setAiData] = useState({});

      useEffect(() => {
        const timer = setTimeout(() => {
          if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise().catch(err => console.log(err));
          }
        }, 100);
        return () => clearTimeout(timer);
      }, [activeModule, activeMark, revealedAnswers, aiData]);

      const toggleAnswer = (id) => setRevealedAnswers(prev => ({ ...prev, [id]: !prev[id] }));

      const handleAIAction = async (q, actionType) => {
        setAiData(prev => ({ ...prev, [q.id]: { loading: true, text: "", type: actionType } }));
        
        let prompt = actionType === 'explain' 
          ? `You are an expert Physics professor evaluating a Diploma exam. Provide the step-by-step solution for this physics problem: "${q.question}". If it is a numerical problem, show the formula, substitution, and final answer with units. If it is a derivation/theory, break it down into evaluator bullet points. Use LaTeX $$ for math.`
          : `Create ONE new physics practice problem exactly like this one but with different values/materials: "${q.question}". Then, solve your new problem step-by-step. Use LaTeX $$ for math.`;

        const responseText = await callGeminiAPI(prompt);
        setAiData(prev => ({ ...prev, [q.id]: { loading: false, text: responseText, type: actionType } }));
      };

      const currentQuestions = examData[activeModule].marks[activeMark];

      return (
        <div className="min-h-screen pb-12">
          {/* Header */}
          <header className="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b-4 border-emerald-500">
            <div className="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
              <div className="flex items-center gap-3">
                <Icons.Atom />
                <div>
                  <h1 className="text-2xl font-bold">Applied Physics II Portal</h1>
                  <p className="text-emerald-400 text-sm">SBTE Revision 2021 | Strict Marking Scheme</p>
                </div>
              </div>
              <div className="flex bg-slate-800 rounded-lg p-1 overflow-x-auto">
                {['1', '3', '7'].map(mark => (
                  <button key={mark} onClick={() => { setActiveMark(mark); setAiData({}); }}
                    className={`px-5 py-2 rounded-md text-sm font-bold whitespace-nowrap ${activeMark === mark ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-300 hover:bg-slate-700'}`}>
                    {mark} Marks
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-6">
            {/* Sidebar */}
            <aside className="w-full md:w-72 flex-shrink-0">
              <div className="bg-white rounded-xl shadow border border-slate-200 sticky top-28">
                <div className="p-4 bg-slate-100 font-bold text-slate-700 flex items-center gap-2 uppercase text-sm border-b">
                  <Icons.Book /> Study Module
                </div>
                <ul>
                  {modules.map((modKey, idx) => (
                    <li key={modKey}>
                      <button onClick={() => { setActiveModule(modKey); setAiData({}); }}
                        className={`w-full text-left px-5 py-4 border-b flex justify-between ${activeModule === modKey ? 'bg-emerald-50 text-emerald-700 font-bold border-l-4 border-l-emerald-500' : 'hover:bg-slate-50'}`}>
                        <span><span className="text-[10px] opacity-60 block uppercase font-bold text-slate-400">Module {idx + 1}</span>{examData[modKey].title}</span>
                        <Icons.ChevronRight />
                      </button>
                    </li>
                  ))}
                </ul>
              </div>
            </aside>

            {/* Content Area */}
            <section className="flex-1 space-y-6">
              <div className="flex justify-between items-center mb-4">
                <span className="bg-slate-200 text-slate-800 px-3 py-1 rounded-md text-lg font-bold">{activeMark}-Mark Questions ({currentQuestions.length} loaded)</span>
              </div>

              {currentQuestions.map((q, idx) => {
                const isRevealed = revealedAnswers[q.id];
                const aiInfo = aiData[q.id];
                return (
                  <div key={q.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-5 bg-slate-50/80 border-b flex gap-4">
                      <div className="w-8 h-8 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0">Q{idx + 1}</div>
                      <div className="text-lg text-slate-800 font-medium math-display">{q.question}</div>
                    </div>

                    <div className="px-5 py-3 flex flex-col sm:flex-row gap-4 border-b bg-white">
                      {/* STATIC EVALUATOR STEPS BUTTON */}
                      <button onClick={() => toggleAnswer(q.id)} className={`flex justify-center items-center gap-2 text-sm font-bold px-4 py-2 rounded-md ${isRevealed ? 'bg-slate-100 text-slate-600' : 'bg-emerald-100 text-emerald-800 hover:bg-emerald-200'}`}>
                        {isRevealed ? <Icons.EyeOff /> : <Icons.Eye />} {isRevealed ? 'Hide Evaluator Steps' : 'View Evaluator Steps'}
                      </button>
                      
                      {/* AI GENERATION BUTTON */}
                      <button onClick={() => handleAIAction(q, 'explain')} className="flex justify-center items-center gap-2 text-sm font-bold px-4 py-2 rounded-md bg-indigo-100 text-indigo-800 hover:bg-indigo-200">
                        <Icons.Sparkles /> AI Solve Steps
                      </button>
                    </div>

                    {/* STATIC ANSWER AREA (Direct from Answer Key PDF) */}
                    {isRevealed && (
                      <div className="p-6 bg-slate-50/50 space-y-3 border-b border-slate-200">
                        <h4 className="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2">Official Answer Key Scoring:</h4>
                        {q.steps.map((step, sIdx) => (
                          <div key={sIdx} className={`p-4 rounded-lg flex gap-4 ${sIdx === q.steps.length - 1 ? 'bg-emerald-50 border border-emerald-200' : 'bg-white border'}`}>
                            {sIdx === q.steps.length - 1 ? <Icons.Check /> : <div className="w-6 h-6 rounded-full bg-slate-200 text-slate-700 flex items-center justify-center text-xs font-bold">{sIdx + 1}</div>}
                            <div className="math-display text-slate-700 font-medium">{step}</div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* AI RESPONSE AREA */}
                    {aiInfo && (
                      <div className="bg-indigo-50/30 p-6">
                        <h3 className="text-indigo-800 font-bold flex items-center gap-2 mb-4"><Icons.Sparkles /> AI Physics Tutor</h3>
                        {aiInfo.loading ? <div className="flex items-center gap-2 text-indigo-600 font-medium"><Icons.Loader /> Calculating physical laws and generating steps...</div> : 
                          <div className="space-y-4 text-slate-700">{aiInfo.text.split('\n').filter(p => p.trim()).map((p, i) => <p key={i} className="math-display">{p}</p>)}</div>}
                      </div>
                    )}
                  </div>
                );
              })}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
